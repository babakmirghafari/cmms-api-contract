name: Build and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  publish-maven:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build and verify
        run: mvn --batch-mode clean verify

      - name: Publish to GitHub Packages (Maven)
        if: github.ref == 'refs/heads/main'
        run: mvn --batch-mode deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload generated sources
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-sources
          path: target/generated-sources/

  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from pom.xml
        id: version
        run: |
          VERSION=$(python3 -c "import xml.etree.ElementTree as ET; t=ET.parse('pom.xml'); ns={'m':'http://maven.apache.org/POM/4.0.0'}; print(t.getroot().find('m:version',ns).text)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@babakmirghafari'

      - name: Install redocly for spec bundling
        run: npm install -g @redocly/cli

      - name: Build spec-distribution npm package
        run: |
          mkdir -p npm-contract/openapi
          # Bundle the spec to inline all $ref references into a single file
          npx @redocly/cli bundle src/main/resources/openapi/api.yaml \
            --output npm-contract/openapi/api.bundled.yaml
          VERSION="${{ steps.version.outputs.version }}"
          cat > npm-contract/package.json <<PKGJSON
          {
            "name": "@babakmirghafari/cmms-api-contract",
            "version": "${VERSION}",
            "description": "CMMS API contract — OpenAPI 3.1 spec distribution for ng-openapi-gen",
            "main": "index.js",
            "files": ["openapi/"],
            "publishConfig": {
              "registry": "https://npm.pkg.github.com/"
            },
            "repository": {
              "type": "git",
              "url": "https://github.com/babakmirghafari/cmms-api-contract.git"
            }
          }
          PKGJSON
          echo "module.exports = {};" > npm-contract/index.js

      - name: Publish spec package to GitHub Packages (npm)
        if: github.ref == 'refs/heads/main'
        run: cd npm-contract && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
