name: Build and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  publish-maven:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build and verify
        run: mvn --batch-mode clean verify

      - name: Publish to GitHub Packages (Maven)
        if: github.ref == 'refs/heads/main'
        run: mvn --batch-mode deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload generated sources
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-sources
          path: target/generated-sources/

  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Read version from pom.xml
        id: version
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@babakmirghafari'

      - name: Install openapi-generator-cli
        run: npm install -g @openapitools/openapi-generator-cli

      - name: Generate TypeScript Angular client
        run: |
          openapi-generator-cli generate \
            -g typescript-angular \
            -i src/main/resources/openapi/api.yaml \
            -o npm-client/ \
            --additional-properties=npmName=@babakmirghafari/cmms-api-client,npmVersion=${{ steps.version.outputs.version }},ngVersion=21.2.14,providedInRoot=true,supportsES6=true

      - name: Build npm package
        run: |
          cd npm-client
          npm install
          npm run build

      - name: Publish to GitHub Packages (npm)
        if: github.ref == 'refs/heads/main'
        run: cd npm-client && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
