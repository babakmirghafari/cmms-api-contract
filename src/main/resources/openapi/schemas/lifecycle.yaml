components:
  schemas:

    AssetReadingDto:
      type: object
      description: A recorded meter reading for an asset
      required:
        - id
        - assetId
        - meter
        - value
        - unit
        - date
        - source
      properties:
        id:
          type: string
          description: Reading identifier (e.g. RD-001)
          example: "RD-001"
        assetId:
          type: string
          format: uuid
          description: UUID of the asset
        assetName:
          type: string
          description: Cached asset name for display
          example: "Hydraulic Press P-03"
        meter:
          type: string
          description: Meter type label
          example: "Operating Hours"
        value:
          type: number
          format: double
          description: Recorded meter value
          example: 12450.0
        unit:
          type: string
          description: Unit of measurement
          example: "h"
        date:
          type: string
          format: date
          description: Date the reading was recorded
          example: "2026-06-03"
        by:
          type: string
          description: Name of the person who recorded the reading
          example: "Lukas Bauer"
        source:
          type: string
          description: Reading source
          enum:
            - manual
            - sensor
          example: "manual"
        pmTriggered:
          type: boolean
          description: Whether this reading triggered a PM work order
          example: false

    AssetReadingCreateRequest:
      type: object
      description: Payload for recording a new asset meter reading
      required:
        - assetId
        - value
        - date
        - source
      properties:
        assetId:
          type: string
          format: uuid
          description: UUID of the asset
        value:
          type: number
          format: double
          description: "New meter reading — must be >= current meter value"
          example: 12500.0
          minimum: 0
        date:
          type: string
          format: date
          description: Date of the reading
          example: "2026-06-03"
        by:
          type: string
          description: Name of the person recording
          example: "Lukas Bauer"
        source:
          type: string
          description: Reading source
          enum:
            - manual
            - sensor
          default: manual

    MeterAssetDto:
      type: object
      description: Asset with metering information and PM due status
      required:
        - id
        - name
        - meter
        - unit
        - meterValue
        - pmDue
      properties:
        id:
          type: string
          format: uuid
          description: Asset UUID
        assetTag:
          type: string
          description: Human-readable asset tag
          example: "AST-001"
        name:
          type: string
          description: Asset name
          example: "Hydraulic Press P-03"
        meter:
          type: string
          description: Meter type label
          example: "Operating Hours"
        unit:
          type: string
          description: Unit of measurement
          example: "h"
        meterValue:
          type: number
          format: double
          description: Current meter reading
          example: 12450.0
        pmInterval:
          type: number
          format: double
          description: PM trigger interval in meter units
          example: 500.0
        lastPmMeter:
          type: number
          format: double
          description: Meter value at last PM
          example: 12000.0
        sinceLastPm:
          type: number
          format: double
          description: Units accumulated since last PM
          example: 450.0
        pmDue:
          type: boolean
          description: Whether PM interval has been breached
          example: false
        lastReadingDate:
          type: string
          format: date
          description: Date of the most recent reading
        lastReadingSource:
          type: string
          description: Source of the most recent reading
          enum:
            - manual
            - sensor
        site:
          type: string
          description: Site name

    DepreciationRegisterEntryDto:
      type: object
      description: Summary depreciation entry for a single asset in the register
      required:
        - id
        - name
        - cost
        - bookValue
        - accumulated
        - depreciatedPct
        - method
      properties:
        id:
          type: string
          format: uuid
          description: Asset UUID
        assetTag:
          type: string
          description: Human-readable asset tag
        name:
          type: string
          description: Asset name
        cost:
          type: number
          format: double
          description: Original acquisition cost (EUR)
          example: 85000.0
        salvage:
          type: number
          format: double
          description: Salvage/residual value (EUR)
          example: 5000.0
        lifeYears:
          type: integer
          description: Useful life in years
          example: 10
        install:
          type: string
          format: date
          description: Installation / acquisition date
        bookValue:
          type: number
          format: double
          description: Current net book value (EUR)
        accumulated:
          type: number
          format: double
          description: Total accumulated depreciation to date (EUR)
        depreciatedPct:
          type: number
          format: double
          description: Percentage of original cost depreciated
          example: 48.5
        method:
          type: string
          description: Depreciation method
          enum:
            - straight-line
            - declining
            - units-of-production
        ageYears:
          type: number
          format: double
          description: Age of the asset in years

    DepreciationScheduleEntry:
      type: object
      description: One row in a year-by-year depreciation schedule
      required:
        - year
        - depreciation
        - accumulated
        - bookValue
      properties:
        year:
          type: integer
          description: Year number (1-based)
        depreciation:
          type: number
          format: double
          description: Depreciation charge for this year (EUR)
        accumulated:
          type: number
          format: double
          description: Total accumulated depreciation at end of this year (EUR)
        bookValue:
          type: number
          format: double
          description: Net book value at end of this year (EUR)

    AssetDepreciationDetailDto:
      type: object
      description: Full depreciation detail for a single asset including formula and schedule
      required:
        - id
        - name
        - method
        - cost
        - bookValue
        - accumulated
        - annual
        - ageYears
        - formulaText
        - schedule
      properties:
        id:
          type: string
          format: uuid
        assetTag:
          type: string
        name:
          type: string
        method:
          type: string
          enum:
            - straight-line
            - declining
            - units-of-production
        cost:
          type: number
          format: double
        salvage:
          type: number
          format: double
        lifeYears:
          type: integer
        install:
          type: string
          format: date
        ageYears:
          type: number
          format: double
        annual:
          type: number
          format: double
          description: Annual depreciation charge (straight-line) or first-year (declining)
        rate:
          type: number
          format: double
          description: Declining balance rate (e.g. 0.2 for 200%/10yr)
        perUnit:
          type: number
          format: double
          description: Depreciation per production unit
        estTotal:
          type: number
          format: double
          description: Estimated total lifetime production units
        unitsUsed:
          type: number
          format: double
          description: Units of production accumulated so far
        bookValue:
          type: number
          format: double
        accumulated:
          type: number
          format: double
        depreciatedPct:
          type: number
          format: double
        formulaText:
          type: string
          description: Human-readable formula explanation
        schedule:
          type: array
          items:
            $ref: '#/components/schemas/DepreciationScheduleEntry'
