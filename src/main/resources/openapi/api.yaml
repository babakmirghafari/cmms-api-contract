        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranslationUpdateRequest'
      responses:
        '200':
          description: Updated translation key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationKeyDto'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: Language or key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /translation/languages/{langCode}/export:
    get:
      summary: Export translations as XLIFF
      operationId: exportTranslations
      tags:
        - translation
      security:
        - bearerAuth: []
      parameters:
        - name: langCode
          in: path
          required: true
          schema:
            type: string
          example: "de"
      responses:
        '200':
          description: XLIFF 2.0 export of translations
          content:
            application/xliff+xml:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '404':
          description: Language not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

  /translation/languages/{langCode}/import:
    post:
      summary: Import translations from XLIFF
      operationId: importTranslations
      tags:
        - translation
      security:
        - bearerAuth: []
      parameters:
        - name: langCode
          in: path
          required: true
          schema:
            type: string
          example: "de"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: XLIFF 2.0 file to import
      responses:
        '200':
          description: Import summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageDto'
        '400':
          description: Invalid XLIFF file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDto'

